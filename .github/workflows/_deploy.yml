# Reusable workflow: Deploy CloudFormation stack for a stage.
# Vercel deploys the frontend automatically on push (branch-to-domain mapping).
# This workflow only handles the AWS infra side.
name: Deploy

on:
  workflow_call:
    inputs:
      stage:
        description: 'Deployment stage (dev, qa, prod)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy-cfn:
    name: Deploy CloudFormation (${{ inputs.stage }})
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.stage }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/my-github-actions-role

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation.yml \
            --stack-name "cloudcanvas-${{ inputs.stage }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              Stage=${{ inputs.stage }} \
              VercelDomain="${{ secrets.VERCEL_DOMAIN }}" \
              CustomDomain="${{ secrets.CUSTOM_DOMAIN }}" \
              ACMCertificateArn="${{ secrets.ACM_CERTIFICATE_ARN }}" \
              HostedZoneId="${{ secrets.HOSTED_ZONE_ID }}" \
              VercelTeamSlug="${{ vars.VERCEL_TEAM_SLUG }}" \
              VercelProjectName="${{ vars.VERCEL_PROJECT_NAME }}" \
              VercelOIDCProviderArn="${{ secrets.VERCEL_OIDC_PROVIDER_ARN }}" \
              ImagesBucketName="${{ secrets.S3_BUCKET_NAME }}" \
              ServicesTableName="${{ secrets.SERVICES_TABLE_NAME }}" \
              UsersTableName="${{ secrets.USERS_TABLE_NAME }}" \
              CategoriesTableName="${{ secrets.CATEGORIES_TABLE_NAME }}"

      - name: Print stack status
        run: |
          aws cloudformation describe-stacks \
            --stack-name "cloudcanvas-${{ inputs.stage }}" \
            --query "Stacks[0].StackStatus" \
            --output text

  wait-for-vercel:
    name: Wait for Vercel ${{ inputs.stage }} deploy
    runs-on: ubuntu-latest
    needs: deploy-cfn
    environment:
      name: ${{ inputs.stage }}
    steps:
      - name: Poll until healthy
        env:
          BASE_URL: https://${{ secrets.CUSTOM_DOMAIN }}
        run: |
          # Vercel deploys async on push; give it time then poll.
          sleep 30
          for i in $(seq 1 48); do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" "$BASE_URL/api/services/stats" || echo "000")
            if [ "$code" = "200" ]; then
              echo "${{ inputs.stage }} healthy after $i attempts"
              exit 0
            fi
            echo "attempt $i: HTTP $code, sleeping 10s"
            sleep 10
          done
          echo "${{ inputs.stage }} never became healthy"
          exit 1
