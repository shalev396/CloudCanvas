# PR to qa: lint, build, then start `npm run dev` locally (against dev AWS
# resources) and run Postman + Playwright against it.
name: PR to QA

on:
  pull_request:
    branches: [qa]

permissions:
  id-token: write
  contents: read

jobs:
  lint-build:
    name: Lint & Build
    uses: ./.github/workflows/_lint-build.yml

  test:
    name: Test
    needs: lint-build
    uses: ./.github/workflows/_test-local.yml
    secrets: inherit
    with:
      environment: dev
      mode: dev
