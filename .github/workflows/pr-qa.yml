# PR to qa: lint, build, then run local tests (Next.js dev + Postman + Playwright)
name: PR to QA

on:
  pull_request:
    branches: [qa]

permissions:
  id-token: write
  contents: read

jobs:
  lint-build:
    name: Lint & Build
    uses: ./.github/workflows/_lint-build.yml

  test:
    name: Test
    needs: lint-build
    uses: ./.github/workflows/_test-local.yml
    secrets: inherit
    with:
      environment: qa
