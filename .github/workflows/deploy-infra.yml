name: Deploy Infrastructure

on:
  push:
    branches: [main, dev]
    paths:
      - cloudformation.yml
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        default: prod
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  resolve-stage:
    runs-on: ubuntu-latest
    outputs:
      stage: ${{ steps.pick.outputs.stage }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "stage=${{ inputs.stage }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "stage=prod" >> "$GITHUB_OUTPUT"
          else
            echo "stage=dev" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: resolve-stage
    name: Deploy CloudFormation (${{ needs.resolve-stage.outputs.stage }})
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-stage.outputs.stage }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/my-github-actions-role

      - name: Deploy CloudFormation stack
        env:
          STAGE: ${{ needs.resolve-stage.outputs.stage }}
        run: |
          aws cloudformation deploy \
            --template-file cloudformation.yml \
            --stack-name "cloudcanvas-${STAGE}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              Stage="${STAGE}" \
              VercelDomain="${{ secrets.VERCEL_DOMAIN }}" \
              CustomDomain="${{ secrets.CUSTOM_DOMAIN }}" \
              ACMCertificateArn="${{ secrets.ACM_CERTIFICATE_ARN }}" \
              HostedZoneId="${{ secrets.HOSTED_ZONE_ID }}" \
              VercelTeamSlug="${{ vars.VERCEL_TEAM_SLUG }}" \
              VercelProjectName="${{ vars.VERCEL_PROJECT_NAME }}" \
              VercelOIDCProviderArn="${{ secrets.VERCEL_OIDC_PROVIDER_ARN }}" \
              ImagesBucketName="${{ secrets.S3_BUCKET_NAME }}" \
              ServicesTableName="${{ secrets.SERVICES_TABLE_NAME }}" \
              UsersTableName="${{ secrets.USERS_TABLE_NAME }}" \
              CategoriesTableName="${{ secrets.CATEGORIES_TABLE_NAME }}"

      - name: Print stack outputs
        env:
          STAGE: ${{ needs.resolve-stage.outputs.stage }}
        run: |
          aws cloudformation describe-stacks \
            --stack-name "cloudcanvas-${STAGE}" \
            --query "Stacks[0].Outputs" \
            --output table
