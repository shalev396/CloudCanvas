$kind: http-request
name: Login - wrong password
url: '{{baseUrl}}/auth/login'
method: POST
auth:
  type: noauth
headers:
  Content-Type: application/json
body:
  type: text
  content: '{}'
scripts:
  - type: beforeRequest
    code: |-
      const email = pm.collectionVariables.get('testAdminEmail') || pm.environment.get('testAdminEmail');
      pm.request.body.raw = JSON.stringify({ email, password: 'definitely-not-the-password' });
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status code is 401', function () {
          pm.response.to.have.status(401);
      });
      pm.test('Returns Invalid credentials', function () {
          const json = pm.response.json();
          pm.expect(json.error).to.equal('Invalid credentials');
      });
    language: text/javascript
order: 1300
