$kind: http-request
name: Login - unknown email
url: '{{baseUrl}}/auth/login'
method: POST
auth:
  type: noauth
headers:
  Content-Type: application/json
body:
  type: text
  content: '{"email":"nobody-12345@cloudcanvas.test","password":"whatever123"}'
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 401', function () {
          pm.response.to.have.status(401);
      });
      pm.test('Returns Invalid credentials', function () {
          const json = pm.response.json();
          pm.expect(json.error).to.equal('Invalid credentials');
      });
    language: text/javascript
order: 1200
