$kind: http-request
name: Login - missing password
url: '{{baseUrl}}/auth/login'
method: POST
auth:
  type: noauth
headers:
  Content-Type: application/json
body:
  type: text
  content: '{"email":"x@y.z"}'
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 400', function () {
          pm.response.to.have.status(400);
      });
    language: text/javascript
order: 1100
