$kind: http-request
name: Get Service Stats
url: '{{baseUrl}}/services/stats'
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });
      pm.test('Returns total + available counts', function () {
          const json = pm.response.json();
          pm.expect(json.data).to.have.property('total');
          pm.expect(json.data).to.have.property('available');
          pm.expect(json.data.total).to.be.at.least(json.data.available);
      });
    language: text/javascript
order: 2000
